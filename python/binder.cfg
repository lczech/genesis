#include <genesis/utils/core/options.hpp>
-function genesis::utils::Options::command_line
-function genesis::utils::Options::command_line_string
-function genesis::utils::Options::random_engine
-function genesis::utils::Options::global_thread_pool

#include <genesis/utils/core/std.hpp>
-function genesis::utils::combine_hashes
-function genesis::utils::combine_hashes_32
-function genesis::utils::combine_hashes_64
