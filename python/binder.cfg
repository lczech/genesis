# ================================================================================================
#   General Binder settings
# ================================================================================================

+namespace genesis

+default_static_pointer_return_value_policy pybind11::return_value_policy::reference_internal
+default_static_lvalue_reference_return_value_policy pybind11::return_value_policy::reference
# +default_member_pointer_return_value_policy pybind11::return_value_policy::reference_internal
# +default_member_lvalue_reference_return_value_policy pybind11::return_value_policy::reference_internal

# +prefix_for_static_member_functions ""

# ================================================================================================
#   C++ STL to Python
# ================================================================================================

# We want to use the pybind STL bindings.
+python_builtin std::string
+python_builtin std::vector
+python_builtin std::list
+python_builtin std::deque
+python_builtin std::array
+python_builtin std::valarray
+python_builtin std::set
+python_builtin std::unordered_set
+python_builtin std::map
+python_builtin std::unordered_map

# Those ones are more tricky. Need to see how to handle them later.
# +python_builtin std::pair
# +python_builtin std::tuple
# +python_builtin std::optional
# +python_builtin std::variant
# +python_builtin std::shared_ptr
# +python_builtin std::unique_ptr

# ================================================================================================
#   std
# ================================================================================================

# Unfortunately, it seems we might need to explicitly blacklist everything from std
# that we do not want bindings for, see https://github.com/RosettaCommons/binder/issues/318
# Not all of them seem to be needed to be excluded if we deactivate the classes and functions
# anyway that cause binder to create bindings for them. Keeping the list here for now.

